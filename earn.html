<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Earn · AG TechScript</title>

<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/earn.css">

<script src="/assets/js/config.js" defer></script>
<script src="/assets/js/guard.js" defer></script>
<script src="/assets/js/header.js" defer></script>
<script src="/assets/js/user-overlay.js" defer></script>
<script src="/assets/js/footer.js" defer></script>
</head>

<body>

<div id="header-container"></div>

<div id="leaderboardModal" class="modal">
    <div class="modal-content leaderboard-modal">
        <div class="modal-header">
            <h2>🏆 Weekly Leaderboard</h2>
            <span class="close-btn" onclick="closeLeaderboard()">✕</span>
        </div>
        <div id="leaderboardList"></div>
    </div>
</div>
<div class="quiz-wrapper">

    <!-- TOP BAR -->
    <div class="quiz-topbar">
        <div class="quiz-week" id="quizWeek">Week</div>
    </div>

    <!-- PROGRESS -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- QUIZ -->
    <div id="quizContainer" class="quiz-container"></div>

</div>

<!-- RESULT MODAL -->
<div id="resultModal" class="result-modal">
    <div class="result-box">
        <h2 id="resultTitle">Quiz Completed</h2>
        <p id="resultText"></p>
        <button onclick="closeResult()">Continue</button>
    </div>
</div>
<div id="leaderboardModal" class="modal">
    <div class="modal-content leaderboard-modal">
        <div class="modal-header">
            <h2>🏆 Weekly Leaderboard</h2>
            <span class="close-btn" onclick="closeLeaderboard()">✕</span>
        </div>
        <div id="leaderboardList"></div>
    </div>
</div>
<div id="footer-container"></div>

<script src="/assets/js/earn.js" defer></script>

</body>
</html>
