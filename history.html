<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History · AG TechScript</title>
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/history.css">
    
    <!-- JS Files (correct order) -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/guard.js"></script>
    <script src="assets/js/user-overlay.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/history.js" defer></script>
</head>
<body>
    <!-- Header Container -->
    <div id="header-container"></div>

    <div class="history-container">
        
        <!-- Header with Title and Filter -->
        <div class="history-header">
            <div class="history-title">
                <i class="fas fa-history"></i>
                Activity History
            </div>
            <span id="recordCount"></span>
            <div class="filter-container">
                <span class="filter-label">
                    <i class="fas fa-filter"></i> Filter:
                </span>
                <select id="historyType" class="history-filter" onchange="changeHistoryType()">
                    <option value="all">📊 All Activities</option>
                    <option value="quiz">🧠 Quiz History</option>
                    <option value="purchase">🛒 Purchase History</option>
                    <option value="points">💎 Points Log</option>
                </select>
            </div>
        </div>
        
        <!-- Summary Stats Cards -->
        <div class="summary-stats" id="summaryStats">
            <!-- Dynamically populated by JS -->
        </div>
        
        <!-- History Table - Glass Card -->
        <div class="table-wrapper">
            <table id="historyTable">
                <thead id="historyHeader">
                    <tr>
                        <th>Date & Time</th>
                        <th>Activity</th>
                        <th>Details</th>
                        <th>Points</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody">
                    <tr class="skeleton">
  <td colspan="5">Loading...</td>
</tr>
                </tbody>
            </table>
        </div>
        
        <!-- Info Card -->
        <div class="info-card">
            <i class="fas fa-chart-line"></i>
            <span>Showing your complete activity history across all platforms.</span>
            <span class="live-badge">
                <i class="fas fa-sync-alt"></i> Live
            </span>
        </div>
        
    </div>

    <!-- FOOTER -->
    <div id="footer-container"></div>
    <script src="assets/js/footer.js"></script>
</body>
</html>
