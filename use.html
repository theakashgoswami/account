<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redeem Rewards · AG TechScript</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/use.css">
     <script src="../assets/js/config.js?v=1.0.0" defer></script>
    <script src="../assets/js/api.js?v=1.0.0" defer></script>
    <script src="../assets/js/guard.js?v=1.0.0" defer></script>
    <script src="../assets/js/header.js?v=1.0.1" defer></script>
    <script src="../assets/js/user-overlay.js?v=1.0.0" defer></script>
     <script src="../assets/js/use.js?v=1.0.0" defer></script>
     <script src="../assets/js/footer.js?v=1.0.0" defer></script>
</head>
<body>
    <div id="header-container"></div>

    <div class="use-container">
        <h1>Redeem Rewards</h1>
        
        <!-- Points Display -->
        <div class="stats-container">
            <div class="stat-card">
                <span>Your Points:</span>
                <strong id="userPoints">0</strong>
            </div>
            <div class="stat-card">
                <span>Your Stamps:</span>
                <strong id="userStamps">0</strong>
            </div>
        </div>

        <!-- 🔥 REWARDS GRID - YEH ADD KARO -->
        <h2>Available Rewards</h2>
        <div id="rewardsGrid" class="rewards-grid">
            <div class="loading">Loading rewards...</div>
        </div>

        <!-- 🔥 HISTORY LIST - YEH ADD KARO -->
        <h2>Redemption History</h2>
        <div id="historyList" class="history-list">
            <div class="loading">Loading history...</div>
        </div>
    </div>

    <!-- 🔥 CONFIRM MODAL - YEH ADD KARO -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <h3>Confirm Redemption</h3>
            <div id="modalRewardDetails"></div>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-secondary">Cancel</button>
                <button onclick="confirmRedeem()" class="btn-confirm">Yes, Redeem</button>
            </div>
        </div>
    </div>

    <div id="footer-container"></div>
</body>
</html>
